name: Add App
run-name: add-app
on:
    workflow_dispatch:
        inputs:
            downloadUrl:
                description: "Download URL of IPA file"
                required: true
                type: string
concurrency:
  group: add-app
  queue: max
jobs:
  add-app:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
            go-version-file: 'go.mod'
            cache-dependency-path: 'go.sum'
      - run: go run ./main.go add ${{ inputs.downloadUrl }}
      - run: |
          git config --global user.name 'foe0933'
          git config --global user.email 'foe0933@users.noreply.github.com'
          git add .
          git commit -am "[GENERATED] Add app"
          git push
